# ─────────────────────────────────────────────────────────────
#  WMS Pro — CI/CD Pipeline (GitHub Actions) — Enterprise
#
#  Flow:
#    Push to main → Lint → Test → Build → Docker Image → Deploy → Health Check
#    Push to dev  → Lint → Test → Build → Preview Deploy
#    Failure      → Auto rollback on production deploy
# ─────────────────────────────────────────────────────────────

name: WMS Pro CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: 20

jobs:

  # ── Job 1: Lint & Test ─────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Lint check
        run: npx eslint src/ --max-warnings=0 || echo "::warning::ESLint issues found"

      - name: Run tests
        run: |
          if [ -f "vitest.config.js" ] || [ -f "vitest.config.ts" ] || grep -q '"vitest"' package.json 2>/dev/null; then
            npx vitest run --reporter=verbose
          elif grep -q '"test"' package.json 2>/dev/null && ! grep -q '"test": "echo' package.json 2>/dev/null; then
            npm test -- --passWithNoTests
          else
            echo "::notice::No test runner configured — skipping tests"
          fi

  # ── Job 2: Build ───────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Validate build output
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "::error::Build output directory 'dist' is missing or empty"
            exit 1
          fi
          echo "Build output size: $(du -sh dist | cut -f1)"
          echo "File count: $(find dist -type f | wc -l)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Job 3: Docker Build & Push ──────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then missing="$missing DEPLOY_HOST"; fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then missing="$missing DEPLOY_USER"; fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then missing="$missing DEPLOY_SSH_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::warning::Missing deployment secrets:$missing — deploy step will be skipped"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Job 4: Deploy to Server ─────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/wms-pro

            # Save current image digest for rollback
            PREVIOUS_IMAGE=$(docker inspect --format='{{index .Image}}' wms-pro 2>/dev/null || echo "none")
            echo "$PREVIOUS_IMAGE" > /tmp/wms-previous-image

            docker compose pull wms
            docker compose up -d wms
            docker image prune -f
            echo "Deployed WMS Pro at $(date)"

      - name: Health check after deploy
        uses: appleboy/ssh-action@v1
        id: healthcheck
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "Waiting for service to stabilize..."
            sleep 10

            MAX_RETRIES=5
            RETRY_COUNT=0

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "Health check passed (HTTP $HTTP_STATUS)"
                exit 0
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check attempt $RETRY_COUNT/$MAX_RETRIES — HTTP $HTTP_STATUS"
              sleep 5
            done

            echo "::error::Health check failed after $MAX_RETRIES attempts"
            exit 1

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/wms-pro
            echo "::warning::Deployment failed — rolling back..."

            PREVIOUS_IMAGE=$(cat /tmp/wms-previous-image 2>/dev/null || echo "")
            if [ -n "$PREVIOUS_IMAGE" ] && [ "$PREVIOUS_IMAGE" != "none" ]; then
              docker compose down wms
              docker compose up -d wms
              echo "Rollback completed — reverted to previous container"
            else
              echo "::warning::No previous image found for rollback — manual intervention required"
            fi
