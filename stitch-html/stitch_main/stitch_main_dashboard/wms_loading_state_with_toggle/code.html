<div class="mb-10 w-full">
<div class="inline-flex flex-col items-center gap-2">
<span class="font-['Inter'] text-[0.6875rem] font-medium uppercase tracking-[0.05em] text-on-surface-variant">Data Mode Selection</span>
<div class="bg-surface-container p-1 rounded-lg flex items-center gap-1">
<button class="px-4 py-1.5 text-xs font-semibold rounded-lg bg-white shadow-sm text-primary transition-all">
                                Live
                            </button>
<button class="px-4 py-1.5 text-xs font-medium rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-all">
                                Cached
                            </button>
</div>
</div>
</div>
<!-- Animated Circular Progress -->
<div class="relative mb-8">
<div class="w-24 h-24 rounded-full border-4 border-surface-container flex items-center justify-center">
<!-- Rotating Segment -->
<div class="absolute inset-0 w-24 h-24 rounded-full border-4 border-t-primary border-r-transparent border-b-transparent border-l-transparent animate-spin-custom"></div>
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">conveyor_belt</span>
</div>
</div>

<div class="space-y-3">
<h2 class="text-on-surface font-medium text-lg">Synchronizing Warehouse Data...</h2>
<p class="text-on-surface-variant text-sm font-normal leading-relaxed">
                        Optimizing inventory streams and validating picking routes for Main Facility Zone A-12.
                    </p>
</div>
<!-- Minimal Progress Meter -->
<div class="mt-10 w-full bg-surface-container h-1 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-700 ease-out" style="width: 65%;"></div>
</div>
<div class="mt-2 flex justify-between w-full">
<span class="text-[0.6875rem] font-bold text-on-surface-variant tracking-wider">65% COMPLETE</span>
