  button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .status { margin-top: 20px; font-size: 13px; color: #4ade80; min-height: 20px; }

    function h1(text) {
      return new Paragraph({ heading: HeadingLevel.HEADING_1, children: [new TextRun({ text, font: "TH SarabunPSK", size: 36, bold: true, color: "1F4E79" })] });
    }
    function h2(text) {
      return new Paragraph({ heading: HeadingLevel.HEADING_2, children: [new TextRun({ text, font: "TH SarabunPSK", size: 32, bold: true, color: "2E75B6" })] });
    }
    function h3(text) {
      return new Paragraph({ heading: HeadingLevel.HEADING_3, spacing: { before: 120, after: 80 }, children: [new TextRun({ text, font: "TH SarabunPSK", size: 28, bold: true, color: "404040" })] });
    }
    function para(text, opts = {}) {
      return new Paragraph({ spacing: { after: 100 }, ...opts, children: [new TextRun({ text, font: "TH SarabunPSK", size: 26, ...opts.run })] });
    }
    function boldPara(label, text) {
      return new Paragraph({ spacing: { after: 80 }, children: [
        new TextRun({ text: label, font: "TH SarabunPSK", size: 26, bold: true }),
        new TextRun({ text, font: "TH SarabunPSK", size: 26 })
      ]});
    }
    function stepPara(num, text) {
      return new Paragraph({ spacing: { after: 60 }, indent: { left: 360 }, children: [
        new TextRun({ text: `${num}. `, font: "TH SarabunPSK", size: 26, bold: true, color: "1F4E79" }),
        new TextRun({ text, font: "TH SarabunPSK", size: 26 })
      ]});
    }
    function notePara(text) {
      return new Paragraph({ spacing: { before: 60, after: 100 }, indent: { left: 360 }, children: [
        new TextRun({ text: "** ", font: "TH SarabunPSK", size: 24, bold: true, color: "C00000" }),
        new TextRun({ text, font: "TH SarabunPSK", size: 24, italics: true, color: "666666" })
      ]});
    }
    function pageBreak() { return new Paragraph({ children: [new PageBreak()] }); }
    function emptyLine() { return new Paragraph({ spacing: { after: 80 }, children: [] }); }

      return new TableRow({ children: texts.map((t, i) => new TableCell({
        borders: headerBorders, width: { size: colWidths[i], type: WidthType.DXA },
        shading: { fill: "1F4E79", type: ShadingType.CLEAR }, margins: cellMargins,
        children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: t, font: "TH SarabunPSK", size: 24, bold: true, color: "FFFFFF" })] })]
      }))});
    }
    function makeRow(texts, colWidths, shade) {
      return new TableRow({ children: texts.map((t, i) => new TableCell({
        borders, width: { size: colWidths[i], type: WidthType.DXA },
        shading: shade ? { fill: "F2F7FB", type: ShadingType.CLEAR } : undefined, margins: cellMargins,
        children: [new Paragraph({ children: [new TextRun({ text: t, font: "TH SarabunPSK", size: 24 })] })]

    }
