<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — KOB WMS Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    .code { font-size: 6rem; font-weight: 800; color: #1e40af; line-height: 1; }
    .message { font-size: 1.25rem; margin: 1rem 0 2rem; color: #94a3b8; }
    a { display: inline-block; padding: 0.75rem 2rem; background: #1e40af; color: #fff; text-decoration: none; border-radius: 0.5rem; font-weight: 600; transition: background 0.2s; }
    a:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="message">Page not found. The resource you requested does not exist.</p>
    <a href="/">Back to Dashboard</a>
  </div>
</body>
</html>
