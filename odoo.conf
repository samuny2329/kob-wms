[options]
; Odoo 18 Configuration for WMS Pro
admin_passwd = wms_master_2026
db_host = postgres
db_port = 5432
db_user = odoo
db_password = odoo_secret_2026
db_name = odoo18
db_filter = ^odoo18$

; Paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Server
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; Workers (production)
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; Logging
log_level = info
logfile = /var/log/odoo/odoo.log
