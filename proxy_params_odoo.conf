# ─────────────────────────────────────────────────────────────
#  Shared Proxy Parameters for Odoo Backend
#  Included by nginx-lb.conf location blocks
# ─────────────────────────────────────────────────────────────

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Keepalive to upstream (reuse connections)
proxy_http_version 1.1;
proxy_set_header Connection "";

# Cookie handling
proxy_cookie_path / /;

# Retry on upstream failures (load balancer failover)
proxy_next_upstream error timeout http_502 http_503;
proxy_next_upstream_timeout 10s;
proxy_next_upstream_tries 2;

# Timeouts (overridden per-location)
proxy_connect_timeout 10s;
proxy_send_timeout 60s;

# No-cache for API responses
add_header Cache-Control "no-store" always;
add_header Pragma "no-cache" always;
