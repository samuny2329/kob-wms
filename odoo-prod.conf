[options]
; Odoo 18 Configuration — Production (Load Balanced)
;
; Tuned for running behind Nginx load balancer with multiple Odoo instances.
; Each instance runs with workers for parallel request handling.
; PgBouncer provides connection pooling to PostgreSQL.

admin_passwd = False
db_host = pgbouncer
db_port = 6432
db_user = odoo
db_password = False
db_name = odoo18
db_filter = ^odoo18$
db_maxconn = 32

; Paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Server
http_port = 8069
longpolling_port = 8072
proxy_mode = True
xmlrpc_interface = 0.0.0.0

; Workers — tuned for load-balanced instances
; Each container gets 6 workers (adjust based on CPU cores per container)
; Formula: workers = 2 * CPU_cores + 1
workers = 6
max_cron_threads = 1

; Memory limits per worker
; Hard limit: OOM kill at 2.5GB (prevents runaway processes)
; Soft limit: Recycle worker after 2GB (graceful restart)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648

; Time limits
; CPU time limit per request: 120s (prevent long-running queries)
; Real time limit: 600s (includes I/O wait)
limit_time_cpu = 120
limit_time_real = 600

; Request limits — recycle workers after N requests to prevent memory leaks
limit_request = 8192

; Logging
log_level = warn
logfile = /var/log/odoo/odoo.log
log_handler = :WARNING,odoo.http:INFO,odoo.sql_db:WARNING

; Performance
osv_memory_count_limit = 0
osv_memory_age_limit = 1.0

; Session management (Redis recommended via Odoo session store module)
; server_wide_modules = base,web,session_redis
