# ─────────────────────────────────────────────────────────────
#  WMS Pro — Full Stack Docker Compose (Production)
#  Services: WMS (Nginx), Odoo 18, PostgreSQL
#
#  Security:
#    - NEVER commit .env with real passwords. Use Docker secrets for production.
#    - POSTGRES_PASSWORD is REQUIRED (enforced via :? syntax).
#    - For production, consider using Docker Swarm secrets or external vault.
#
#  Prerequisites:
#    Copy .env.example to .env and fill in secrets before starting.
#
#  Usage:
#    docker compose up -d          # Start all services
#    docker compose up -d wms      # Start WMS only (no Odoo)
#    docker compose logs -f wms    # View WMS logs
#    docker compose down           # Stop all
# ─────────────────────────────────────────────────────────────

services:

  # ── WMS Pro (React + Nginx) ──────────────
  wms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms-pro
    ports:
      - "${WMS_PORT:-3000}:80"
    depends_on:
      odoo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
        reservations:
          memory: 64M
          cpus: "0.10"
    networks:
      - wms-network
    labels:
      - "com.wms.service=frontend"

  # ── Odoo 18 ERP ─────────────────────────
  odoo:
    image: odoo:18
    container_name: wms-odoo
    ports:
      - "${ODOO_PORT:-8069}:8069"
      - "${ODOO_LONGPOLL_PORT:-8072}:8072"
    environment:
      - HOST=postgres
      - PORT=5432
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    env_file:
      - .env
    volumes:
      - odoo-data:/var/lib/odoo
      - odoo-addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.00"
        reservations:
          memory: 512M
          cpus: "0.25"
    networks:
      - wms-network
    labels:
      - "com.wms.service=erp"

  # ── PostgreSQL 16 ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odoo18}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-odoo18}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M
          cpus: "0.10"
    networks:
      - wms-network
    labels:
      - "com.wms.service=database"

# ── Volumes ──────────────────────────────
volumes:
  postgres-data:
    driver: local
  odoo-data:
    driver: local
  odoo-addons:
    driver: local

# ── Network ──────────────────────────────
networks:
  wms-network:
    driver: bridge
    name: wms-pro-network
    ipam:
      config:
        - subnet: 172.28.0.0/16
