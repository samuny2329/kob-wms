# ─────────────────────────────────────────────────────────────
#  WMS Pro — Full Stack Docker Compose
#  Services: WMS (Nginx), Odoo 18, PostgreSQL
#
#  Usage:
#    docker compose up -d          # Start all services
#    docker compose up -d wms      # Start WMS only (no Odoo)
#    docker compose logs -f wms    # View WMS logs
#    docker compose down           # Stop all
# ─────────────────────────────────────────────────────────────

services:

  # ── WMS Pro (React + Nginx) ──────────────
  wms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms-pro
    ports:
      - "3000:80"
    depends_on:
      odoo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wms-network
    labels:
      - "com.wms.service=frontend"

  # ── Odoo 18 ERP ─────────────────────────
  odoo:
    image: odoo:18
    container_name: wms-odoo
    ports:
      - "8069:8069"
      - "8072:8072"   # Live chat / longpolling
    environment:
      - HOST=postgres
      - PORT=5432
      - USER=odoo
      - PASSWORD=odoo_secret_2026
    volumes:
      - odoo-data:/var/lib/odoo
      - odoo-addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - wms-network
    labels:
      - "com.wms.service=erp"

  # ── PostgreSQL 16 ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    environment:
      POSTGRES_DB: odoo18
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_secret_2026
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoo18"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wms-network
    labels:
      - "com.wms.service=database"

# ── Volumes ──────────────────────────────
volumes:
  postgres-data:
    driver: local
  odoo-data:
    driver: local
  odoo-addons:
    driver: local

# ── Network ──────────────────────────────
networks:
  wms-network:
    driver: bridge
    name: wms-pro-network
