# ─────────────────────────────────────────────────────────────
#  WMS Pro — Nginx Load Balancer Configuration (Production)
#
#  Features:
#    - Weighted round-robin across Odoo instances
#    - Active health checks (fail_timeout + max_fails)
#    - Separate upstream for long-polling (WebSocket)
#    - Connection keepalive pooling
#    - Tiered rate limiting (API / auth / heavy operations)
#    - Request buffering for slow clients
#    - Graceful degradation with custom error pages
# ─────────────────────────────────────────────────────────────

# ── Rate Limiting Zones ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=wms_api:10m         rate=20r/s;
limit_req_zone $binary_remote_addr zone=wms_auth:10m        rate=3r/m;
limit_req_zone $binary_remote_addr zone=wms_heavy:10m       rate=5r/s;
limit_req_zone $binary_remote_addr zone=wms_report:10m      rate=2r/s;

# Connection limiting per IP
limit_conn_zone $binary_remote_addr zone=wms_conn:10m;

# ── Upstream: Odoo HTTP (Load Balanced) ────────────────────
# Docker service discovery: "odoo" resolves to all replicas
# least_conn: route to instance with fewest active connections
upstream odoo_backend {
    least_conn;

    # Docker Compose service name — resolves to multiple IPs when scaled
    server odoo:8069 max_fails=3 fail_timeout=30s;

    # Keepalive connections to backend (reuse TCP connections)
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ── Upstream: Odoo Longpoll / WebSocket ────────────────────
upstream odoo_longpoll {
    least_conn;
    server odoo:8072 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ── Proxy Cache (for static Odoo assets) ──────────────────
proxy_cache_path /var/cache/nginx/odoo levels=1:2 keys_zone=odoo_cache:10m
                 max_size=500m inactive=60m use_temp_path=off;

# ── Server Block ──────────────────────────────────────────
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Connection limit per IP
    limit_conn wms_conn 50;

    # Request size limit
    client_max_body_size 25m;

    # Buffering: absorb slow client uploads before forwarding to backend
    client_body_buffer_size 128k;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml
               application/x-font-ttf font/opentype;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://placehold.co; font-src 'self' data:; connect-src 'self' https://api.anthropic.com; form-action 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    server_tokens off;

    # ── Static Assets (WMS Frontend) ──────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA Fallback ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Health Check Endpoint (for external LB / monitoring) ─
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"wms-nginx"}';
        add_header Content-Type application/json;
    }

    # ── Odoo Backend Health Probe ─────────────────────────
    location = /health/odoo {
        internal;
        proxy_pass http://odoo_backend/web/login;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── No-cache for API proxy responses ──────────────────
    location /api/ {
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
    }

    # ── Auth Endpoints (strict rate limit) ────────────────
    location /web/session/ {
        limit_req zone=wms_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo_backend/web/session/;
        include /etc/nginx/proxy_params_odoo.conf;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Dataset/RPC Endpoints (standard rate limit) ───────
    location /web/dataset/ {
        limit_req zone=wms_api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo_backend/web/dataset/;
        include /etc/nginx/proxy_params_odoo.conf;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── General Odoo Web ──────────────────────────────────
    location /web/ {
        limit_req zone=wms_api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo_backend/web/;
        include /etc/nginx/proxy_params_odoo.conf;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── WMS Custom Endpoints ──────────────────────────────
    location /wms/ {
        limit_req zone=wms_api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo_backend/wms/;
        include /etc/nginx/proxy_params_odoo.conf;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Report / Heavy Operations ─────────────────────────
    location /report/ {
        limit_req zone=wms_report burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo_backend/report/;
        include /etc/nginx/proxy_params_odoo.conf;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Longpoll / WebSocket (bus) ────────────────────────
    location /longpolling/ {
        proxy_pass http://odoo_longpoll/longpolling/;
        include /etc/nginx/proxy_params_odoo.conf;
        proxy_read_timeout 3600s;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Odoo Static Assets (cached) ──────────────────────
    location /web/static/ {
        proxy_pass http://odoo_backend/web/static/;
        proxy_cache odoo_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        expires 1h;
    }

    # ── Error Pages ───────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too many requests. Please slow down.","retry_after":10}';
        add_header Content-Type application/json always;
        add_header Retry-After 10 always;
    }
}
