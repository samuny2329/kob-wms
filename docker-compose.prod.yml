# ─────────────────────────────────────────────────────────────
#  WMS Pro — Production Load-Balanced Stack
#  Extends docker-compose.yml with:
#    - Multiple Odoo workers behind Nginx load balancer
#    - Redis for session sharing across Odoo instances
#    - PgBouncer for PostgreSQL connection pooling
#    - Prometheus + health endpoints for monitoring
#
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --scale odoo=3
# ─────────────────────────────────────────────────────────────

services:

  # ── Override WMS to use production nginx config ──────────
  wms:
    volumes:
      - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
      replicas: 1

  # ── Override Odoo for horizontal scaling ─────────────────
  odoo:
    # Remove container_name to allow scaling
    container_name: ""
    # Remove fixed port mapping — Nginx handles routing
    ports: []
    environment:
      - HOST=pgbouncer
      - PORT=6432
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: ${ODOO_REPLICAS:-2}
      resources:
        limits:
          memory: 2G
          cpus: "1.50"
        reservations:
          memory: 768M
          cpus: "0.50"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  # ── PgBouncer — Connection Pooling for PostgreSQL ────────
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: wms-pgbouncer
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-odoo}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-odoo18}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 300
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      STATS_PERIOD: 60
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - wms-network
    labels:
      - "com.wms.service=connection-pool"

  # ── Redis — Session Store for Odoo Load Balancing ────────
  redis:
    image: redis:7-alpine
    container_name: wms-redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-wms_redis_2026}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-wms_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
    networks:
      - wms-network
    labels:
      - "com.wms.service=session-store"

  # ── Override PostgreSQL for production ────────────────────
  postgres:
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.00"
        reservations:
          memory: 512M
          cpus: "0.50"
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c max_connections=200
      -c max_wal_size=1GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c log_min_duration_statement=1000

volumes:
  redis-data:
    driver: local
