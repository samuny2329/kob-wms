# ─────────────────────────────────────────────────────────────
#  WMS Pro — Nginx Configuration (Enterprise)
# ─────────────────────────────────────────────────────────────

# Rate limiting: 10 requests/sec per IP, burst up to 20
limit_req_zone $binary_remote_addr zone=wms_rate_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=wms_login_limit:10m rate=3r/m;

# Upstream block for Odoo backend (change address via env or here)
upstream odoo_backend {
    server odoo:8069;
    keepalive 32;
}

# ─── SSL/TLS Configuration (uncomment to enable) ────────────
# To enable HTTPS:
#   1. Obtain SSL certificates (e.g., via Let's Encrypt / certbot)
#   2. Mount certs into the container or copy them in Dockerfile
#   3. Uncomment the server block below and the redirect in port-80 block
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
#     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
#     ssl_prefer_server_ciphers on;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 10m;
#     ssl_stapling        on;
#     ssl_stapling_verify on;
#
#     # Include the same location blocks as the port-80 server below
# }
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Uncomment to redirect all HTTP to HTTPS when SSL is enabled:
    # return 301 https://$host$request_uri;

    # Request size limit (prevent large payload attacks)
    client_max_body_size 10m;

    # Rate limiting on API proxy routes
    # (applied per-location below; global default here)

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://placehold.co; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Disable server version
    server_tokens off;

    # Cache static assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Stricter rate limit for Odoo session/auth endpoints
    location /web/session/ {
        limit_req zone=wms_login_limit burst=5 nodelay;

        proxy_pass http://odoo_backend/web/session/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_cookie_path / /;
    }

    # Proxy API calls to Odoo
    location /web/ {
        limit_req zone=wms_rate_limit burst=20 nodelay;

        proxy_pass http://odoo_backend/web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_cookie_path / /;
    }

    location /wms/ {
        limit_req zone=wms_rate_limit burst=20 nodelay;

        proxy_pass http://odoo_backend/wms/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
